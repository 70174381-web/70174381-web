name: generate profile trophies

on:
  schedule:
    - cron: "0 0 * * *"      # regenerates once a day
  workflow_dispatch:         # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: 70174381-web
          output_path: profile-trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-trophy.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "update trophies"
          git push
