name: generate profile trophies

on:
  schedule:
    - cron: "0 0 * * *"      # regenerates once a day
  workflow_dispatch:         # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: generate trophies
        uses: ryo-ma/github-profile-trophy@v1
        with:
          username: 70174381-web
          output: profile-trophy.svg
          theme: tokyonight
          column: 4
          margin-w: 15
          margin-h: 15

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-trophy.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "update trophies"
          git push
